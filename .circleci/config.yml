version: 2.1
setup: true
orbs:
  continuation: circleci/continuation@0.3.1
jobs:
  checkout_and_install:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/protocol
    steps:
      - checkout
      - run:
          name: Install Prereqs
          command: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev yarn
      - run:
          name: Install Dependencies
          command: yarn --frozen-lockfile
      - run:
          name: Install Foundry
          command: |
            export FOUNDRY_VERSION=nightly-70cd140131cd49875c6f31626bdfae08eba35386
            curl -fsSL https://foundry.paradigm.xyz | SHELL=/bin/bash bash
            export PATH="/home/circleci/.foundry/bin:$PATH"
            foundryup --install "$FOUNDRY_VERSION"
      - save_cache:
          key: protocol-{{ .Environment.CIRCLE_SHA1 }}
          paths:
            - ~/protocol
            - ~/.ssh
            - ~/.foundry
  build:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/protocol
    resource_class: large
    steps:
      - restore_cache:
          key: protocol-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: Install Prereqs
          command: sudo apt-get update && sudo apt-get install -y rsync
      - run:
          name: Run build
          command: yarn qbuild
      - run:
          name: Modified packages
          command: ./ci/check_lerna_packages.sh
      - save_cache:
          key: protocol-completed-build-{{ .Environment.CIRCLE_SHA1 }}
          paths:
            - ~/protocol
            - ~/.ssh
            - ~/.foundry
  lint:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/protocol
    steps:
      - restore_cache:
          key: protocol-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: Lint
          command: ./ci/lint.sh
  test:
    executor: continuation/default
    steps:
      - restore_cache:
          key: protocol-completed-build-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: Generate Tests
          command: |
            export PATH="/home/circleci/.foundry/bin:$PATH"
            cd /home/circleci/protocol
            ./ci/generate_lerna_config.sh
      - continuation/continue:
          configuration_path: /home/circleci/protocol/.circleci/lerna_config.yml
  coverage:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/protocol
    steps:
      - checkout
      - restore_cache:
          key: protocol-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: Run coverage
          command: ./ci/coverage.sh ~/protocol/packages/core
      - store_artifacts:
          path: packages/core/coverage
  publish:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/protocol
    steps:
      - add_ssh_keys:
          fingerprints:
            - "ad:e6:34:8f:ee:03:d5:b2:29:38:8c:64:0f:83:a2:ab"
      - restore_cache:
          key: protocol-completed-build-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: Install Prereqs
          command: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev yarn rsync
      - run:
          name: Ignore untracked files
          command: rm -rf lerna_output lerna_packages
      - run:
          name: Reset generated Foundry temp path
          command: |
            git restore --staged packages/core/temp/lib/forge-std || true
            rm -rf packages/core/temp/lib/forge-std
            mkdir -p packages/core/temp/lib/forge-std
      - run:
          name: Publish
          command: yarn run publish-release
workflows:
  version: 2.1
  build_and_test:
    jobs:
      - checkout_and_install
      - build:
          requires:
            - checkout_and_install
      - lint:
          requires:
            - checkout_and_install
      - test:
          requires:
            - build
      - publish:
          context: api_keys
          requires:
            - build
            - test
          filters:
            branches:
              only: master
  # Note: The nightly workflow will be commented here, because the feature used
  # from circle CI to split the jobs not allow more than one workflow at the moment.
  # nightly:
  #   triggers:
  #     - schedule:
  #         cron: "0 0 * * *"
  #         filters:
  #           branches:
  #             only:
  #               - master
  #   jobs:
  #     - checkout_and_install
  #     - coverage:
  #         requires:
  #           - checkout_and_install
